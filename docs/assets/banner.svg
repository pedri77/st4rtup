<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="st4rtup — Founder Productivity Suite: internal CRM + 22 n8n workflows for selling GRC at Riskitera">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#451a03"/>
      <stop offset="0.45" stop-color="#b45309"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="rocketGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="0.1" cy="0.95" r="0.55">
      <stop offset="0" stop-color="#fcd34d" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#451a03" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" rx="36" ry="36" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="36" ry="36" fill="url(#halo)"/>
  <rect width="1280" height="320" rx="36" ry="36" fill="url(#halo2)"/>

  <!-- Decorative grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.05">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
  </g>

  <!-- Floating circles for depth -->
  <circle cx="1140" cy="78"  r="120" fill="#fde68a" fill-opacity="0.07"/>
  <circle cx="1190" cy="270" r="55"  fill="#fde68a" fill-opacity="0.10"/>
  <circle cx="80"   cy="270" r="80"  fill="#451a03" fill-opacity="0.18"/>

  <!-- Rocket emblem -->
  <g transform="translate(110, 90)" filter="url(#softShadow)">
    <!-- exhaust trail -->
    <path d="M52 142 Q60 162 52 180 Q44 162 52 142 Z" fill="#fde68a" fill-opacity="0.55"/>
    <path d="M76 144 Q86 168 76 192 Q66 168 76 144 Z" fill="#fbbf24" fill-opacity="0.7"/>
    <path d="M100 142 Q108 162 100 180 Q92 162 100 142 Z" fill="#fde68a" fill-opacity="0.55"/>
    <!-- rocket body -->
    <path d="M76 8 C100 28 110 60 110 96 L110 130 L42 130 L42 96 C42 60 52 28 76 8 Z"
          fill="url(#rocketGrad)" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <!-- window -->
    <circle cx="76" cy="62" r="14" fill="#451a03" stroke="#ffffff" stroke-width="3"/>
    <circle cx="80" cy="58" r="4" fill="#fde68a" fill-opacity="0.85"/>
    <!-- left fin -->
    <path d="M42 96 L18 130 L42 130 Z" fill="#b45309" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <!-- right fin -->
    <path d="M110 96 L134 130 L110 130 Z" fill="#b45309" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <!-- belt -->
    <line x1="42" y1="108" x2="110" y2="108" stroke="#451a03" stroke-width="2" stroke-opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" fill="#ffffff">
    <text x="290" y="135" font-size="92" font-weight="800" letter-spacing="-2">st4rtup</text>
    <text x="294" y="180" font-size="22" font-weight="600" fill-opacity="0.85" letter-spacing="0.5">
      Founder Productivity Suite — internal CRM + 22 n8n workflows for selling GRC
    </text>
  </g>

  <!-- Right-side stat pills -->
  <g font-family="Inter, system-ui, sans-serif" font-weight="700" fill="#ffffff">
    <g transform="translate(290, 215)">
      <rect width="138" height="34" rx="17" fill="#ffffff" fill-opacity="0.12"/>
      <text x="14" y="22" font-size="13">📋  Full sales cycle</text>
    </g>
    <g transform="translate(440, 215)">
      <rect width="148" height="34" rx="17" fill="#ffffff" fill-opacity="0.12"/>
      <text x="14" y="22" font-size="13">🔁  22 automations</text>
    </g>
    <g transform="translate(600, 215)">
      <rect width="148" height="34" rx="17" fill="#ffffff" fill-opacity="0.12"/>
      <text x="14" y="22" font-size="13">📨  6 email providers</text>
    </g>
    <g transform="translate(760, 215)">
      <rect width="148" height="34" rx="17" fill="#ffffff" fill-opacity="0.12"/>
      <text x="14" y="22" font-size="13">🤖  7 AI providers</text>
    </g>
  </g>

  <!-- Version chip -->
  <g transform="translate(1100, 38)">
    <rect width="120" height="34" rx="17" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.3"/>
    <text x="60" y="22" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700"
          fill="#ffffff" text-anchor="middle">PROD · v1.2</text>
  </g>
</svg>

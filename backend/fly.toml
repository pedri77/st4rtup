# fly.toml — St4rtup CRM Backend
# https://fly.io/docs/reference/configuration/

app = 'st4rtup-backend'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  max_unavailable = 0.33

[env]
  API_V1_PREFIX = '/api/v1'
  APP_ENV = 'production'
  APP_NAME = 'st4rtup'
  DEBUG = 'False'
  PORT = '8001'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpus = 1

[metrics]
  port = 8001
  path = '/health'

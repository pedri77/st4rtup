name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint with ruff
        run: ruff check app/

      - name: Run tests with coverage
        run: pytest tests/ -v --asyncio-mode=auto --cov=app --cov-report=term-missing --cov-fail-under=60
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SUPABASE_JWT_SECRET: test-secret-key-for-ci-only-not-real
          SECRET_KEY: test-secret-key-for-ci
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsYWNlaG9sZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE2MTYwMDAwMDAsImV4cCI6MTkzMTM2MDAwMH0.placeholder

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint with ESLint
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  deploy:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment health
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://riskitera-sales-backend.fly.dev/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            curl -s https://riskitera-sales-backend.fly.dev/health
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"
          curl -s https://riskitera-sales-backend.fly.dev/health | python3 -m json.tool

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend tests ──────────────────────────────────────────────
  backend-test:
    name: Backend (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
      APP_ENV: test
      SECRET_KEY: test-secret-key-12345678901234567890123456789012
      SUPABASE_URL: https://fakeref.supabase.co
      SUPABASE_ANON_KEY: eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJpc3MiOiAic3VwYWJhc2UiLCAicmVmIjogImZha2VyZWYiLCAicm9sZSI6ICJhbm9uIiwgImlhdCI6IDE3MDAwMDAwMDAsICJleHAiOiAyMTAwMDAwMDAwfQ.ZmFrZXNpZzEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiAiSFMyNTYiLCAidHlwIjogIkpXVCJ9.eyJpc3MiOiAic3VwYWJhc2UiLCAicmVmIjogImZha2VyZWYiLCAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLCAiaWF0IjogMTcwMDAwMDAwMCwgImV4cCI6IDIxMDAwMDAwMDB9.ZmFrZXNpZzEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Run tests
        run: pytest tests/ --asyncio-mode=auto --tb=short -q

  # ── Frontend build + test ──────────────────────────────────────
  frontend-build:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

  # ── Deploy backend to Hetzner (SSH + rsync) ────────────────────
  deploy-backend:
    name: Deploy Backend (Hetzner)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync app code to server
        run: |
          SSH="ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no"
          # Sync app/ with --delete (only code, safe)
          rsync -az --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            -e "$SSH" \
            backend/app/ \
            root@${{ secrets.HETZNER_HOST }}:/opt/st4rtup/app/
          # Sync alembic/ with --delete
          rsync -az --delete \
            --exclude '__pycache__' \
            -e "$SSH" \
            backend/alembic/ \
            root@${{ secrets.HETZNER_HOST }}:/opt/st4rtup/alembic/
          # Sync requirements.txt (no --delete, single file)
          rsync -az \
            -e "$SSH" \
            backend/requirements.txt \
            root@${{ secrets.HETZNER_HOST }}:/opt/st4rtup/requirements.txt

      - name: Rebuild and restart container
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            "cd /opt/st4rtup && docker compose -f docker-compose.production.yml build --no-cache && docker compose -f docker-compose.production.yml up -d"

      - name: Run alembic migrations inside container
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            "docker exec st4rtup-api python -m alembic upgrade head"

      - name: Health check (retry up to 30s)
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no \
            root@${{ secrets.HETZNER_HOST }} \
            'for i in $(seq 1 15); do
               if curl -sf http://127.0.0.1:8001/health | grep -q healthy; then
                 echo "healthy after ${i}s"; exit 0;
               fi
               sleep 2
             done
             echo "health check failed after 30s"; exit 1'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy

  # ── Deploy frontend to Cloudflare Pages ────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=st4rtup --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
